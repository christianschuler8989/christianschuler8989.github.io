<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Christian Schuler</title>
    <link rel="stylesheet" href="css/styles.css">
    <link rel="stylesheet" href="css/hexagon.css">
    <link rel="stylesheet" href="css/responsive.css">
    <script src="https://cdnjs.cloudflare.com/ajax/libs/d3/7.8.5/d3.min.js"></script>
</head>
<body>
    <!-- Hexagonal Navigation Header -->
    <header class="hex-nav-header">
        <div class="hex-nav-container">
            <div class="logo-section">
                <span class="logo-text">Christian<br>Schuler</span>
            </div>
            <nav class="hex-navigation" id="hex-navigation">
                <!-- Hexagonal navigation elements will be generated by JS -->
            </nav>
        </div>
    </header>

    <!-- Main Content Area -->
    <main class="main-content" id="main-content">
        <div class="page-container" id="page-container">
            <!-- Page content will be loaded dynamically -->
        </div>
    </main>

    <!-- Loading overlay -->
    <div class="loading-overlay" id="loading-overlay">
        <div class="loading-spinner"></div>
    </div>

    <!-- Scripts -->
    <script src="js/main.js"></script>
    <script src="js/navigation.js"></script>
    <!-- <script src="js/hexagon-layout.js"></script> -->
    <script src="js/page-loader.js"></script>
</body>
</html>
