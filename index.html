<!DOCTYPE html>
<!-- 
    index.html - The main entry point for the research homepage.
    This is a minimal static HTML file that defines the basic page structure.
    All navigation and content are dynamically injected via JavaScript for a data-driven SPA experience.
    Styles and scripts are loaded here to ensure proper initialization order.
-->
<html lang="en">
<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>My Research Homepage</title>

    <!-- GLOBAL CSS: Core styling applied site-wide -->
    <!-- reset.css: Normalizes browser defaults for consistent cross-browser rendering -->
    <!-- theme.css: Applies color palette and CSS variables from theme.json (via theme.js later) -->
    <!-- layout.css: Defines the overall SPA structure (sidebar navigation + main content area) -->
    <!-- hexagons.css: Styles for 3D layered hexagonal navigation buttons, honeycomb tiling, and animations -->
    <link rel="stylesheet" href="assets/css/reset.css">
    <link rel="stylesheet" href="assets/css/theme.css">
    <link rel="stylesheet" href="assets/css/layout.css">
    <link rel="stylesheet" href="assets/css/hexagons.css">
</head>

<body>
    <!-- NAVIGATION INJECTION POINT: 
         navigation.js will dynamically create and insert the vertical hexagonal navigation bar here.
         Relies on hexagons.css for styling and data from config/site.json or similar. -->
    <aside id="navigation"></aside>

    <!-- MAIN CONTENT INJECTION POINT: 
         loader.js and main.js (or related modules) will populate sections here based on JSON content files.
         Scrollspy.js will observe these sections for highlight/smooth-scroll behavior. -->
    <!-- <main id="content" class="container"></main> -->
    <main id="content"></main>

    <!-- JAVASCRIPT MODULES: Loaded in dependency order -->
    <!-- utils.js: General helper functions used across the project -->
    <!-- loader.js: Handles fetching and injecting JSON data/content -->
    <!-- theme.js: Applies theme from config/theme.json to CSS variables -->
    <!-- i18n.js: Manages internationalization and language switching -->
    <!-- navigation.js: Builds the hexagonal navigation and attaches click handlers -->
    <!-- scrollspy.js: Enables scroll-based highlighting and smooth scrolling -->
    <!-- main.js: Orchestrator that initializes all features after DOM load -->
    <script src="assets/js/utils.js"></script>
    <script src="assets/js/loader.js"></script>
    <script src="assets/js/theme.js"></script>
    <script src="assets/js/i18n.js"></script>
    <script src="assets/js/navigation.js"></script>
    <script src="assets/js/scrollspy.js"></script>
    <script src="assets/js/main.js"></script>
</body>
</html>
